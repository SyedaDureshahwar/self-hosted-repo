# .github/workflows/deploy-self-hosted.yml

name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy HTML
        run: |
          mkdir -p /var/www/html/demo
          cp index.html /var/www/html/demo/

      - name: Verify Deployment
        run: |
          ls -la /var/www/html/demo